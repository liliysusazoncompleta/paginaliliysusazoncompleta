services:
  - type: web
    name: lili-sazon-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: corepack enable && corepack prepare pnpm@10.12.1 --activate && cd .. && pnpm install --frozen-lockfile && pnpm --filter @lili/backend build
    startCommand: pnpm --filter @lili/backend start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: FRONTEND_URL
        value: https://liliysusazoncompleta.github.io
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO_EMAIL
        value: liliysusazoncompleto@gmail.com
      - key: CONTACT_FROM_EMAIL
        sync: false
      - key: WHATSAPP_PHONE
        value: "573177719249"
