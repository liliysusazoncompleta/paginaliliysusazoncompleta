<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Catalogo online de Lili y su Sazon Completa. Explora productos caseros, arma tu carrito y confirma por WhatsApp."
    />
    <meta name="theme-color" content="#D9591F" />
    <title>Lili y su Sazon Completa | Sabor de Familia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      // Contraparte de public/404.html: decodifica la ruta original que iba
      // en el query string y la restaura con history.replaceState ANTES de
      // que React Router se monte, para que abra la ruta correcta en vez de
      // quedarse siempre en "/". Ver https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
