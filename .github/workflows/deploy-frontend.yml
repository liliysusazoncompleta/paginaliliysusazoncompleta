name: Deploy frontend a GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      # frontend/.env.production (VITE_API_URL, VITE_ASSETS_URL) se toma tal cual
      # esta commiteado en el repo, o se puede sobreescribir aqui con secrets si se prefiere.
      - name: Build frontend
        run: pnpm --filter @lili/frontend build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
